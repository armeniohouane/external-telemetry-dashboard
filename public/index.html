<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>External Telemetry Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Dashboard Externo</h1>
      <p>Telemetria do agente Clientes Irregulares</p>
    </div>

    <div class="card">
      <h2>Live Control</h2>
      <div class="buttons">
        <button class="primary" onclick="sendCommand('PauseSystem')">Pausar</button>
        <button class="primary" onclick="sendCommand('ResumeSystem')">Retomar</button>
        <button class="danger" onclick="sendCommand('PauseWebWorker')">Pausar Web</button>
        <button class="primary" onclick="sendCommand('ResumeWebWorker')">Retomar Web</button>
      </div>
    </div>

    <div class="card">
      <h2>Última Telemetria</h2>
      <pre id="telemetry">A carregar...</pre>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
